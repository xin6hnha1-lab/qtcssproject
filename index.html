<main>
        <h2>Interactive Photo Gallery</h2>
        <p>Hover over the images below to display them in full size with descriptions.</p>

        <div id="image">
            Hover over an image below to display here.
        </div>

        <div class="preview-container">
            <img class="preview" 
                 src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600" 
                 alt="Coding background with HTML/CSS code on screen" 
                 onmouseover="upDate(this)" 
                 onmouseout="undo()">
            
            <img class="preview" 
                 src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600" 
                 alt="Retro gaming setup with monitors and consoles" 
                 onmouseover="upDate(this)" 
                 onmouseout="undo()">
            
            <img class="preview" 
                 src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=600" 
                 alt="Professional studio microphone and headphones" 
                 onmouseover="upDate(this)" 
                 onmouseout="undo()">
        </div>
    </main>
